<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Choose me</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;overflow:hidden;width:100vw;height:100vh;cursor:none;font-family:monospace}
  #glitch-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;mix-blend-mode:screen}
  #center{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:2;pointer-events:none}
  .choose-wrap{position:relative;text-align:center}
  #title{
    font-size:clamp(3rem,10vw,7rem);
    font-weight:400;
    font-family:'Special Elite',serif;
    color:#ff0033;
    text-shadow:0 0 10px #ff0033,0 0 30px #ff003366;
    letter-spacing:0.1em;
    position:relative;
    animation:flicker 0.15s steps(1) infinite, shake 0.08s steps(1) infinite;
    user-select:none;
    display:inline-block;
  }
  #title::before{
    content:attr(data-text);
    position:absolute;left:0;top:0;width:100%;
    font-family:'Special Elite',serif;
    color:#0ff;
    opacity:0;
    animation:ghost-blue 4s steps(1) infinite
  }
  #title::after{
    content:attr(data-text);
    position:absolute;left:0;top:0;width:100%;
    font-family:'Special Elite',serif;
    color:#ff0033;
    opacity:0;
    animation:ghost-red 4s steps(1) infinite
  }
  #subtitle{
    font-size:clamp(0.6rem,1.5vw,0.9rem);
    color:#33ff00;
    opacity:0.5;
    letter-spacing:0.3em;
    text-transform:uppercase;
    margin-top:1rem;
    animation:sub-flicker 3s steps(1) infinite;
    font-family:monospace;
  }
  #cursor{
    position:fixed;width:12px;height:12px;
    border:1.5px solid #ff0033;
    border-radius:50%;z-index:999;
    pointer-events:none;
    box-shadow:0 0 8px #ff0033;
  }
  #scanlines{
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);
    z-index:10;pointer-events:none
  }
  #noise-flash{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9;pointer-events:none;opacity:0}
  @keyframes shake{
    0%  {transform:translate(0,0) rotate(0deg)}
    10% {transform:translate(-2px,1px) rotate(-0.3deg)}
    20% {transform:translate(1px,-2px) rotate(0.2deg)}
    30% {transform:translate(-1px,2px) rotate(0.1deg)}
    40% {transform:translate(2px,1px) rotate(-0.2deg)}
    50% {transform:translate(0,-1px) rotate(0.3deg)}
    60% {transform:translate(-2px,0) rotate(-0.1deg)}
    70% {transform:translate(1px,2px) rotate(0.2deg)}
    80% {transform:translate(-1px,-1px) rotate(-0.3deg)}
    90% {transform:translate(2px,-2px) rotate(0.1deg)}
    100%{transform:translate(0,0) rotate(0deg)}
  }
  @keyframes flicker{
    0%,95%,100%{opacity:1}
    96%{opacity:0.85}
    97%{opacity:1}
    98%{opacity:0.55}
    99%{opacity:1}
  }
  @keyframes ghost-blue{
    0%,85%,100%{opacity:0;transform:translateX(0)}
    86%{opacity:0.7;transform:translateX(-4px) skewX(-2deg)}
    89%{opacity:0;transform:translateX(0)}
    90%{opacity:0.4;transform:translateX(3px)}
    91%{opacity:0}
  }
  @keyframes ghost-red{
    0%,88%,100%{opacity:0;transform:translateX(0)}
    89%{opacity:0.6;transform:translateX(5px) skewX(1deg)}
    92%{opacity:0;transform:translateX(0)}
    93%{opacity:0.3;transform:translateX(-2px)}
    94%{opacity:0}
  }
  @keyframes sub-flicker{
    0%,70%,80%,100%{opacity:0.5}
    71%{opacity:0.1}
    75%{opacity:0.7}
    76%{opacity:0.2}
    78%{opacity:0.6}
  }
</style>
</head>
<body>
<div id="glitch-overlay"></div>
<div id="scanlines"></div>
<div id="noise-flash"></div>
<div id="center">
  <div class="choose-wrap">
    <div id="title" data-text="Choose me">Choose me</div>
    <div id="subtitle">[ system.override // access_granted ]</div>
  </div>
</div>
<div id="cursor"></div>

<script>
const cursor=document.getElementById('cursor');
let mx=window.innerWidth/2,my=window.innerHeight/2,cx=mx,cy=my;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
function shakeCursor(){
  const dx=mx-cx,dy=my-cy;
  cx+=dx*0.08;cy+=dy*0.08;
  const jitter=Math.random()<0.06?Math.random()*6-3:0;
  const jitter2=Math.random()<0.06?Math.random()*6-3:0;
  cursor.style.left=(cx+jitter-6)+'px';
  cursor.style.top=(cy+jitter2-6)+'px';
  requestAnimationFrame(shakeCursor);
}
shakeCursor();

const title=document.getElementById('title');
const noiseFlash=document.getElementById('noise-flash');
const glitchOverlay=document.getElementById('glitch-overlay');

function triggerGlitch(){
  const type=Math.random();
  if(type<0.4){
    title.style.textShadow=`${Math.random()*8-4}px 0 #0ff, ${Math.random()*8-4}px 0 #f0f, 0 0 20px #ff0033`;
    const skew=`skewX(${Math.random()*6-3}deg) translateX(${Math.random()*10-5}px)`;
    title.style.setProperty('--extra-transform', skew);
    title.style.animation='flicker 0.15s steps(1) infinite';
    setTimeout(()=>{
      title.style.textShadow='';
      title.style.animation='flicker 0.15s steps(1) infinite, shake 0.08s steps(1) infinite';
    },80+Math.random()*120);
  }
  if(type<0.15){
    noiseFlash.style.opacity='1';
    let strips='';
    for(let i=0;i<8;i++){
      const y=Math.random()*100;const h=Math.random()*3+0.5;
      const x=(Math.random()*20-10)+'px';
      strips+=`<div style="position:absolute;top:${y}%;left:0;width:100%;height:${h}%;background:rgba(255,0,51,0.15);transform:translateX(${x})"></div>`;
    }
    noiseFlash.innerHTML=strips;
    setTimeout(()=>{noiseFlash.style.opacity='0';noiseFlash.innerHTML=''},60+Math.random()*80);
  }
  if(type>0.85){
    const split=document.createElement('div');
    split.textContent='Choose me';
    Object.assign(split.style,{
      position:'absolute',fontFamily:"'Special Elite',serif",fontWeight:'400',
      color:'transparent',
      WebkitTextStroke:'1px #0ff',
      left:'50%',top:'50%',
      transform:`translate(-50%,-50%) translateX(${Math.random()*30-15}px) translateY(${Math.random()*10-5}px)`,
      opacity:'0.6',pointerEvents:'none',whiteSpace:'nowrap',letterSpacing:'0.1em',
      fontSize:'clamp(3rem,10vw,7rem)',zIndex:'3'
    });
    document.querySelector('.choose-wrap').appendChild(split);
    setTimeout(()=>split.remove(),50+Math.random()*100);
  }
  setTimeout(triggerGlitch,300+Math.random()*2000);
}
triggerGlitch();

function triggerHeavyGlitch(){
  glitchOverlay.innerHTML='';
  const n=5+Math.random()*8|0;
  for(let i=0;i<n;i++){
    const bar=document.createElement('div');
    const y=Math.random()*100;
    Object.assign(bar.style,{
      position:'absolute',top:y+'%',left:'0',width:'100%',
      height:(Math.random()*4+1)+'%',
      background:`rgba(${Math.random()<0.5?'255,0,51':'0,255,255'},${0.05+Math.random()*0.12})`,
      transform:`translateX(${Math.random()*40-20}px)`
    });
    glitchOverlay.appendChild(bar);
  }
  Object.assign(glitchOverlay.style,{width:'100%',height:'100%',position:'fixed',top:'0',left:'0'});
  setTimeout(()=>{glitchOverlay.innerHTML=''},80+Math.random()*150);
  setTimeout(triggerHeavyGlitch,2000+Math.random()*5000);
}
triggerHeavyGlitch();
</script>
</body>
</html>
