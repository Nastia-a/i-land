<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Choose me</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;overflow:hidden;width:100vw;height:100vh;cursor:none;font-family:monospace}
  #glitch-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;mix-blend-mode:screen}
  #center{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:2;pointer-events:none}
  .choose-wrap{position:relative;text-align:center}
  #title{
    font-size:clamp(3rem,10vw,7rem);
    font-weight:400;
    font-family:'Special Elite',serif;
    color:#ff0033;
    text-shadow:0 0 10px #ff0033,0 0 30px #ff003366;
    letter-spacing:0.1em;
    position:relative;
    user-select:none;
    display:inline-flex;
    animation:title-flicker 0.15s steps(1) infinite;
  }
  .letter{
    display:inline-block;
    position:relative;
    animation:flicker 0.15s steps(1) infinite;
    will-change:transform;
  }
  .letter.space{width:0.3em}
  #subtitle{
    font-size:clamp(0.6rem,1.5vw,0.9rem);
    color:#33ff00;
    opacity:0.5;
    letter-spacing:0.3em;
    text-transform:uppercase;
    margin-top:1rem;
    animation:sub-flicker 3s steps(1) infinite;
    font-family:monospace;
  }
  #cursor{
    position:fixed;width:12px;height:12px;
    border:1.5px solid #ff0033;
    border-radius:50%;z-index:999;
    pointer-events:none;
    box-shadow:0 0 8px #ff0033;
  }
  #scanlines{
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);
    z-index:10;pointer-events:none
  }
  #noise-flash{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9;pointer-events:none;opacity:0}
  @keyframes title-flicker{
    0%,95%,100%{opacity:1}
    96%{opacity:0.85}
    97%{opacity:1}
    98%{opacity:0.55}
    99%{opacity:1}
  }
  @keyframes sub-flicker{
    0%,70%,80%,100%{opacity:0.5}
    71%{opacity:0.1}
    75%{opacity:0.7}
    76%{opacity:0.2}
    78%{opacity:0.6}
  }
</style>
</head>
<body>
<div id="glitch-overlay"></div>
<div id="scanlines"></div>
<div id="noise-flash"></div>
<div id="center">
  <div class="choose-wrap">
    <div id="title"></div>
    <div id="subtitle">[ system.override // access_granted ]</div>
  </div>
</div>
<div id="cursor"></div>

<script>
const TEXT = 'CHOOSE ME';
const titleEl = document.getElementById('title');
titleEl.setAttribute('data-text', TEXT);

const letterEls = [];

TEXT.split('').forEach((ch, i) => {
  if(ch === ' '){
    const sp = document.createElement('span');
    sp.className = 'letter space';
    titleEl.appendChild(sp);
    letterEls.push(null);
  } else {
    const span = document.createElement('span');
    span.className = 'letter';
    span.textContent = ch;
    titleEl.appendChild(span);
    letterEls.push(span);
  }
});

// Per-letter independent shake state
const states = letterEls.map(() => ({
  tx: 0, ty: 0, rot: 0,
  vx: 0, vy: 0, vr: 0,
  targetX: 0, targetY: 0, targetR: 0,
  nextTarget: 0
}));

let lastTime = 0;
function animateLetters(ts){
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  states.forEach((s, i) => {
    if(!letterEls[i]) return;
    if(ts >= s.nextTarget){
      s.targetX = (Math.random()*6 - 3);
      s.targetY = (Math.random()*6 - 3);
      s.targetR = (Math.random()*4 - 2);
      s.nextTarget = ts + 10 + Math.random()*30;
    }
    const spring = 0.45, damp = 0.35;
    s.vx += (s.targetX - s.tx) * spring;
    s.vy += (s.targetY - s.ty) * spring;
    s.vr += (s.targetR - s.rot) * spring;
    s.vx *= damp; s.vy *= damp; s.vr *= damp;
    s.tx += s.vx; s.ty += s.vy; s.rot += s.vr;
    letterEls[i].style.transform = `translate(${s.tx.toFixed(2)}px,${s.ty.toFixed(2)}px) rotate(${s.rot.toFixed(2)}deg)`;
  });
  requestAnimationFrame(animateLetters);
}
requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(animateLetters); });

// Cursor
const cursor = document.getElementById('cursor');
let mx = innerWidth/2, my = innerHeight/2, cx = mx, cy = my;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
function moveCursor(){
  cx += (mx - cx) * 0.08; cy += (my - cy) * 0.08;
  const jx = Math.random() < 0.06 ? Math.random()*6-3 : 0;
  const jy = Math.random() < 0.06 ? Math.random()*6-3 : 0;
  cursor.style.left = (cx+jx-6)+'px';
  cursor.style.top  = (cy+jy-6)+'px';
  requestAnimationFrame(moveCursor);
}
moveCursor();

// Per-letter char glitch
const GLITCH_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&!?*<>{}[]';
const originalChars = letterEls.map(el => el ? el.textContent : null);

function glitchLetter(idx){
  const el = letterEls[idx];
  if(!el) return;
  const orig = originalChars[idx];
  let flips = 2 + (Math.random()*4|0);
  let count = 0;
  const colors = ['#0ff','#f0f','#fff','#ff0033','#33ff00'];

  function flip(){
    if(count >= flips){
      el.textContent = orig;
      el.style.color = '';
      el.style.textShadow = '';
      return;
    }
    el.textContent = GLITCH_CHARS[Math.random()*GLITCH_CHARS.length|0];
    el.style.color = colors[Math.random()*colors.length|0];
    el.style.textShadow = `0 0 8px currentColor`;
    count++;
    setTimeout(flip, 40 + Math.random()*60);
  }
  flip();
}

function scheduleLetterGlitches(){
  const realIdxs = letterEls.map((el,i)=>el?i:-1).filter(i=>i>=0);
  const count = 1 + (Math.random()*2|0);
  for(let k=0;k<count;k++){
    const idx = realIdxs[Math.random()*realIdxs.length|0];
    setTimeout(()=>glitchLetter(idx), Math.random()*200);
  }
  setTimeout(scheduleLetterGlitches, 400 + Math.random()*1200);
}
scheduleLetterGlitches();

// Glitch
const noiseFlash = document.getElementById('noise-flash');
const glitchOverlay = document.getElementById('glitch-overlay');

function triggerGlitch(){
  const type = Math.random();
  if(type < 0.4){
    titleEl.style.textShadow = `${Math.random()*8-4}px 0 #0ff, ${Math.random()*8-4}px 0 #f0f, 0 0 20px #ff0033`;
    setTimeout(() => { titleEl.style.textShadow = ''; }, 80 + Math.random()*120);
  }
  if(type < 0.15){
    noiseFlash.style.opacity = '1';
    let s = '';
    for(let i=0;i<8;i++){
      const y=Math.random()*100, h=Math.random()*3+0.5, x=(Math.random()*20-10)+'px';
      s += `<div style="position:absolute;top:${y}%;left:0;width:100%;height:${h}%;background:rgba(255,0,51,0.15);transform:translateX(${x})"></div>`;
    }
    noiseFlash.innerHTML = s;
    setTimeout(() => { noiseFlash.style.opacity='0'; noiseFlash.innerHTML=''; }, 60+Math.random()*80);
  }
  if(type > 0.85){
    const split = document.createElement('div');
    split.textContent = 'CHOOSE ME';
    Object.assign(split.style,{
      position:'absolute', fontFamily:"'Special Elite',serif", fontWeight:'400',
      color:'transparent', WebkitTextStroke:'1px #0ff',
      left:'50%', top:'50%',
      transform:`translate(-50%,-50%) translateX(${Math.random()*30-15}px) translateY(${Math.random()*10-5}px)`,
      opacity:'0.6', pointerEvents:'none', whiteSpace:'nowrap', letterSpacing:'0.1em',
      fontSize:'clamp(3rem,10vw,7rem)', zIndex:'3'
    });
    document.querySelector('.choose-wrap').appendChild(split);
    setTimeout(() => split.remove(), 50+Math.random()*100);
  }
  setTimeout(triggerGlitch, 300+Math.random()*2000);
}
triggerGlitch();

function triggerHeavyGlitch(){
  glitchOverlay.innerHTML = '';
  const n = 5 + (Math.random()*8|0);
  for(let i=0;i<n;i++){
    const bar = document.createElement('div');
    Object.assign(bar.style,{
      position:'absolute', top:Math.random()*100+'%', left:'0', width:'100%',
      height:(Math.random()*4+1)+'%',
      background:`rgba(${Math.random()<0.5?'255,0,51':'0,255,255'},${0.05+Math.random()*0.12})`,
      transform:`translateX(${Math.random()*40-20}px)`
    });
    glitchOverlay.appendChild(bar);
  }
  Object.assign(glitchOverlay.style,{width:'100%',height:'100%',position:'fixed',top:'0',left:'0'});
  setTimeout(() => { glitchOverlay.innerHTML=''; }, 80+Math.random()*150);
  setTimeout(triggerHeavyGlitch, 2000+Math.random()*5000);
}
triggerHeavyGlitch();
</script>
</body>
</html>
